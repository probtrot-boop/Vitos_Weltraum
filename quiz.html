<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 Weltraum-Quiz</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #04060e;
    color: white;
    font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* STARS */
  #stars { position:fixed; inset:0; z-index:0; pointer-events:none; }
  .star {
    position:absolute; background:white; border-radius:50%;
    animation: twinkle var(--dur) ease-in-out infinite; opacity:0;
  }
  @keyframes twinkle { 0%,100%{opacity:0;} 50%{opacity:var(--op);} }

  /* WRAPPER */
  .wrapper {
    position: relative; z-index: 10;
    max-width: 680px; margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* HEADER */
  .header { text-align:center; margin-bottom: 48px; }
  .header-emoji {
    font-size: clamp(3.5rem, 10vw, 5.5rem);
    display: block; margin-bottom: 14px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100%{transform:translateY(0) rotate(-4deg);}
    50%{transform:translateY(-12px) rotate(4deg);}
  }
  .header h1 {
    font-size: clamp(2rem, 7vw, 3.2rem); font-weight:900; line-height:1.15;
    background: linear-gradient(135deg, #FFD166, #FF9A3C, #FF6B9D);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text; margin-bottom: 10px;
    animation: popIn 0.8s cubic-bezier(0.175,0.885,0.32,1.275) both;
  }
  @keyframes popIn { from{opacity:0;transform:scale(0.5);} to{opacity:1;transform:scale(1);} }
  .header p { font-size:1rem; color:rgba(255,255,255,0.45); font-weight:600; animation: fadeUp 1s 0.3s both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }

  /* PROGRESS */
  .progress-wrap { margin-bottom: 32px; animation: fadeUp 1s 0.5s both; }
  .progress-label {
    display: flex; justify-content:space-between;
    font-size:0.8rem; font-weight:700; color:rgba(255,255,255,0.35);
    margin-bottom: 8px; text-transform:uppercase; letter-spacing:1px;
  }
  .progress-track {
    height: 8px; background:rgba(255,255,255,0.07); border-radius:99px; overflow:hidden;
  }
  .progress-fill {
    height:100%; border-radius:99px;
    background: linear-gradient(90deg, #FF9A3C, #FFD166);
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  /* QUESTION CARD */
  .question-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 28px; padding: 32px 28px;
    margin-bottom: 20px;
    animation: cardSlide 0.5s cubic-bezier(0.4,0,0.2,1) both;
  }
  @keyframes cardSlide {
    from{opacity:0;transform:translateX(40px);}
    to{opacity:1;transform:translateX(0);}
  }

  .question-category {
    font-size:0.72rem; font-weight:800; text-transform:uppercase;
    letter-spacing:2px; margin-bottom:14px;
    display:inline-flex; align-items:center; gap:6px;
    padding: 5px 12px; border-radius:99px;
    background: rgba(255,255,255,0.06);
  }

  .question-text {
    font-size: clamp(1.05rem, 3vw, 1.25rem);
    font-weight:700; line-height:1.6; margin-bottom:24px;
    color: rgba(255,255,255,0.92);
  }

  /* OPTIONS */
  .options { display:flex; flex-direction:column; gap:12px; }

  .option-btn {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 16px 20px;
    color: white; font-family:'Trebuchet MS',sans-serif;
    font-size: 1rem; font-weight:600; text-align:left;
    cursor: pointer; transition: all 0.2s ease;
    display:flex; align-items:center; gap:14px;
  }
  .option-btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.25);
    transform: translateX(4px);
  }
  .option-btn .opt-letter {
    width:32px; height:32px; border-radius:50%;
    background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.15);
    display:flex; align-items:center; justify-content:center;
    font-size:0.85rem; font-weight:800; flex-shrink:0;
    transition: all 0.2s;
  }
  .option-btn.correct {
    background: rgba(6,255,180,0.12);
    border-color: #06FFB4;
    animation: correctPop 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  .option-btn.correct .opt-letter {
    background:#06FFB4; border-color:#06FFB4; color:#04060e;
  }
  .option-btn.wrong {
    background: rgba(255,80,80,0.1);
    border-color: #FF5050;
  }
  .option-btn.wrong .opt-letter {
    background:#FF5050; border-color:#FF5050; color:white;
  }
  .option-btn.reveal {
    background: rgba(6,255,180,0.07);
    border-color: rgba(6,255,180,0.3);
  }
  @keyframes correctPop {
    0%{transform:scale(1);} 50%{transform:scale(1.03);} 100%{transform:scale(1);}
  }

  /* FEEDBACK */
  .feedback {
    margin-top:16px; padding:14px 18px; border-radius:14px;
    font-size:0.95rem; line-height:1.6; font-weight:600;
    display:none; animation:fadeUp 0.4s both;
  }
  .feedback.show { display:block; }
  .feedback.correct-fb { background:rgba(6,255,180,0.1); color:#06FFB4; border:1px solid rgba(6,255,180,0.2); }
  .feedback.wrong-fb { background:rgba(255,80,80,0.08); color:#FF8080; border:1px solid rgba(255,80,80,0.15); }

  /* NEXT BUTTON */
  .next-btn {
    width:100%; margin-top:20px; padding:16px;
    border-radius:16px; border:none;
    background: linear-gradient(135deg, #FF9A3C, #FFD166);
    color: #04060e; font-family:'Trebuchet MS',sans-serif;
    font-size:1.05rem; font-weight:800; cursor:pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    display:none;
  }
  .next-btn.show { display:block; animation:fadeUp 0.4s 0.2s both; }
  .next-btn:hover { transform:scale(1.02); box-shadow:0 8px 24px rgba(255,154,60,0.3); }

  /* STARS COUNTER */
  .stars-row {
    display:flex; justify-content:center; gap:8px;
    margin-bottom:32px; animation:fadeUp 1s 0.6s both;
  }
  .star-dot {
    width:20px; height:20px; border-radius:50%;
    background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.15);
    transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
    font-size:0.7rem; display:flex; align-items:center; justify-content:center;
  }
  .star-dot.earned { background:#FFD166; border-color:#FFD166; transform:scale(1.2); }
  .star-dot.wrong-dot { background:#FF5050; border-color:#FF5050; }

  /* RESULT SCREEN */
  #resultScreen {
    display:none; text-align:center;
    animation: popIn 0.8s cubic-bezier(0.175,0.885,0.32,1.275) both;
  }
  #resultScreen.show { display:block; }

  .result-emoji { font-size:6rem; display:block; margin-bottom:20px; animation:float 3s ease-in-out infinite; }
  .result-title { font-size:clamp(2rem,7vw,3rem); font-weight:900; margin-bottom:12px; }
  .result-score {
    font-size:clamp(3rem,10vw,5rem); font-weight:900;
    background:linear-gradient(135deg,#FFD166,#FF9A3C);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text; display:block; margin:8px 0 20px;
  }

  .praise-box {
    background:rgba(255,209,102,0.08); border:2px solid rgba(255,209,102,0.2);
    border-radius:24px; padding:24px 28px; margin:24px 0; text-align:left;
  }
  .praise-box h3 { font-size:1.2rem; color:#FFD166; margin-bottom:10px; }
  .praise-box p { font-size:1rem; color:rgba(255,255,255,0.8); line-height:1.7; }

  .tips-box {
    background:rgba(6,214,255,0.06); border:2px solid rgba(6,214,255,0.15);
    border-radius:24px; padding:24px 28px; margin:16px 0; text-align:left;
  }
  .tips-box h3 { font-size:1.2rem; color:#06D6FF; margin-bottom:14px; }
  .tip-item {
    display:flex; gap:12px; margin-bottom:12px; align-items:flex-start;
  }
  .tip-icon { font-size:1.3rem; flex-shrink:0; margin-top:2px; }
  .tip-text { font-size:0.95rem; color:rgba(255,255,255,0.75); line-height:1.6; }

  .missed-box {
    background:rgba(255,80,80,0.05); border:1px solid rgba(255,80,80,0.15);
    border-radius:24px; padding:24px 28px; margin:16px 0; text-align:left;
  }
  .missed-box h3 { font-size:1.1rem; color:#FF8080; margin-bottom:14px; }
  .missed-item { margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid rgba(255,255,255,0.06); }
  .missed-item:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
  .missed-q { font-size:0.85rem; color:rgba(255,255,255,0.5); margin-bottom:4px; }
  .missed-a { font-size:0.95rem; color:#06FFB4; font-weight:700; }

  .replay-btn {
    display:inline-flex; align-items:center; gap:10px;
    padding:16px 36px; border-radius:99px; border:none;
    background:linear-gradient(135deg,#FF9A3C,#FFD166);
    color:#04060e; font-family:'Trebuchet MS',sans-serif;
    font-size:1.1rem; font-weight:800; cursor:pointer;
    margin-top:28px; transition:transform 0.2s, box-shadow 0.2s;
  }
  .replay-btn:hover { transform:scale(1.05); box-shadow:0 12px 32px rgba(255,154,60,0.4); }

  .home-link {
    display:block; margin-top:20px;
    color:rgba(255,255,255,0.25); font-size:0.85rem; text-decoration:none;
  }
  .home-link:hover { color:rgba(255,255,255,0.5); }

  /* CONFETTI */
  .confetti-piece {
    position:fixed; width:8px; height:8px; border-radius:2px;
    animation:confettiFall var(--cd) ease-in var(--cdelay) both;
    z-index:200; pointer-events:none;
  }
  @keyframes confettiFall {
    0%{transform:translate(var(--cx),var(--cy)) rotate(0deg);opacity:1;}
    100%{transform:translate(calc(var(--cx) + var(--csx)),calc(var(--cy) + 100vh)) rotate(var(--cr));opacity:0;}
  }

  @media(max-width:500px) {
    .wrapper { padding:24px 14px 60px; }
    .question-card { padding:24px 18px; }
  }
</style>
</head>
<body>

<div id="stars"></div>

<div class="wrapper">

  <!-- HEADER -->
  <div class="header" id="quizHeader">
    <span class="header-emoji">🧠</span>
    <h1>Weltraum-Quiz!</h1>
    <p>Teste dein Wissen – 12 Fragen warten auf dich</p>
  </div>

  <!-- STARS ROW -->
  <div class="stars-row" id="starsRow"></div>

  <!-- PROGRESS -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressText">Frage 1 von 12</span>
      <span id="scoreText">⭐ 0 Punkte</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- QUESTION -->
  <div id="questionArea"></div>

  <!-- RESULT -->
  <div id="resultScreen"></div>

</div>

<script>
const questions = [
  // ERDE
  {
    cat: "🌍 Erde", catColor: "#FF9A3C",
    q: "Vor wie vielen Jahren ist die Erde entstanden?",
    opts: ["1 Million Jahren","4.5 Milliarden Jahren","100 Millionen Jahren","10 Milliarden Jahren"],
    correct: 1,
    fb: "Richtig! Die Erde ist unvorstellbar alt – 4.5 Milliarden Jahre! Das ist so viel, dass kein Mensch das wirklich begreifen kann. 🌍"
  },
  {
    cat: "🌍 Erde", catColor: "#FF9A3C",
    q: "Woraus ist die Erde am Anfang entstanden?",
    opts: ["Aus Wasser","Aus Eis und Schnee","Aus einer Staubwolke im Weltraum","Aus einem anderen Planeten"],
    correct: 2,
    fb: "Genau! Winzige Staubkörnchen haben sich im Weltraum zusammengezogen – wie kleine Magnete – und wurden immer grösser. 🌫️"
  },
  {
    cat: "🌍 Erde", catColor: "#FF9A3C",
    q: "Wie war die Erde kurz nach ihrer Entstehung?",
    opts: ["Kalt und mit viel Schnee","Ein riesiger Feuerball aus flüssigem Gestein","Blau und voller Wasser","Grün mit viel Wald"],
    correct: 1,
    fb: "Ja! Die junge Erde war ein glühender Feuerball – so heiss, dass alles Gestein geschmolzen war. Erst nach Millionen Jahren kühlte sie ab. 🔥"
  },
  {
    cat: "🌍 Erde", catColor: "#FF9A3C",
    q: "Wie sind die Meere auf der Erde entstanden?",
    opts: ["Ein riesiger Komet brachte das Wasser","Es hat Millionen Jahre lang geregnet","Vulkane haben Wasser gespuckt","Die Sonne hat das Eis geschmolzen"],
    correct: 1,
    fb: "Super! Als die Erde sich abkühlte, bildeten sich Wolken und es regnete Millionen Jahre lang – so füllten sich die Meere. 🌧️"
  },

  // AMEISE
  {
    cat: "🐜 Ameise", catColor: "#06D6FF",
    q: "Im Weltraum-Ameisen-Modell: Was ist so gross wie ein Fussball?",
    opts: ["Die Erde","Der Mond","Die Sonne","Jupiter"],
    correct: 2,
    fb: "Richtig! Im Modell ist die Sonne so gross wie ein Fussball – und steht etwa 25 Meter von der Ameise (=Erde) entfernt. ⚽☀️"
  },
  {
    cat: "🐜 Ameise", catColor: "#06D6FF",
    q: "Wie lange würde eine Ameise täglich von Naters nach Brig laufen müssen, um die Sonne zu erreichen?",
    opts: ["1 Jahr","32 Jahre","100 Jahre","1000 Jahre"],
    correct: 1,
    fb: "Genau – 32 Jahre! Das ist so lange wie ein Erwachsener schon lebt. Die Sonne ist unvorstellbar weit weg! ☀️"
  },
  {
    cat: "🐜 Ameise", catColor: "#06D6FF",
    q: "Wie heisst der nächste Stern nach unserer Sonne?",
    opts: ["Sirius","Andromeda","Proxima Centauri","Jupiter"],
    correct: 2,
    fb: "Bravo! Proxima Centauri ist unser nächster Sternnachbar – und trotzdem bräuchte unsere Ameise 6'400 Jahre, täglich von Naters nach Tokio zu laufen! ⭐"
  },
  {
    cat: "🐜 Ameise", catColor: "#06D6FF",
    q: "Was ist Andromeda?",
    opts: ["Ein Planet in unserem Sonnensystem","Eine Nachbar-Galaxie mit einer Billion Sternen","Ein Schwarzes Loch","Ein Mond von Saturn"],
    correct: 1,
    fb: "Super! Andromeda ist unsere nächste Nachbar-Galaxie – sie enthält über eine Billion Sterne! 🌀"
  },

  // SCHWARZE LÖCHER
  {
    cat: "🕳️ Schwarzes Loch", catColor: "#C77DFF",
    q: "Was kann einem Schwarzen Loch NICHT entkommen?",
    opts: ["Steine","Gas","Licht","Alle drei können nicht entkommen"],
    correct: 3,
    fb: "Richtig! Nichts kann einem Schwarzen Loch entkommen – nicht einmal das Licht! Deshalb ist es schwarz und unsichtbar. 🕳️"
  },
  {
    cat: "🕳️ Schwarzes Loch", catColor: "#C77DFF",
    q: "Wie entsteht ein Schwarzes Loch?",
    opts: ["Wenn zwei Planeten zusammenstossen","Wenn ein riesiger Stern explodiert und zusammenfällt","Wenn die Sonne verlischt","Wenn Kometen zusammenkleben"],
    correct: 1,
    fb: "Genau! Ein riesiger Stern explodiert (Supernova) und fällt dann in sich zusammen – das Ergebnis ist ein Schwarzes Loch. 💥"
  },
  {
    cat: "🕳️ Schwarzes Loch", catColor: "#C77DFF",
    q: "Was nennen Wissenschaftler 'Spaghettifizierung'?",
    opts: ["Wenn ein Schwarzes Loch Nudeln mag","Wenn man in ein Schwarzes Loch fällt und in die Länge gezogen wird","Wenn Sterne sich drehen","Wenn Gas um ein Schwarzes Loch kreist"],
    correct: 1,
    fb: "Haha – ja! Die Schwerkraft zieht Objekte in die Länge wie eine Nudel. Wissenschaftler haben tatsächlich diesen lustigen Namen gewählt! 🍝"
  },
  {
    cat: "🕳️ Schwarzes Loch", catColor: "#C77DFF",
    q: "In welchem Jahr wurde das erste echte Foto eines Schwarzen Lochs gemacht?",
    opts: ["1969","2001","2019","2023"],
    correct: 2,
    fb: "Richtig! 2019 haben über 200 Wissenschaftler aus aller Welt ihr Teleskop gleichzeitig ausgerichtet und das erste echte Bild geschossen! 📸"
  }
];

let current = 0;
let score = 0;
let answered = false;
let missedQuestions = [];

// INIT STARS
const starsEl = document.getElementById('stars');
for(let i=0;i<200;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*2.5+0.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${Math.random()*4+2}s;--op:${Math.random()*0.7+0.2};animation-delay:${Math.random()*6}s;`;
  starsEl.appendChild(s);
}

// INIT STAR DOTS
function initStarDots() {
  const row = document.getElementById('starsRow');
  row.innerHTML = '';
  for(let i=0;i<questions.length;i++){
    const d=document.createElement('div');
    d.className='star-dot';
    d.id=`dot-${i}`;
    row.appendChild(d);
  }
}

function updateProgress() {
  document.getElementById('progressText').textContent = `Frage ${current+1} von ${questions.length}`;
  document.getElementById('scoreText').textContent = `⭐ ${score} Punkte`;
  document.getElementById('progressFill').style.width = `${(current/questions.length)*100}%`;
}

function renderQuestion() {
  answered = false;
  updateProgress();
  const q = questions[current];
  const letters = ['A','B','C','D'];

  const area = document.getElementById('questionArea');
  area.innerHTML = `
    <div class="question-card" style="border-color:rgba(255,255,255,0.09)">
      <div class="question-category" style="color:${q.catColor}">${q.cat}</div>
      <div class="question-text">${q.q}</div>
      <div class="options" id="options">
        ${q.opts.map((opt,i)=>`
          <button class="option-btn" onclick="selectAnswer(${i})" id="opt-${i}">
            <span class="opt-letter">${letters[i]}</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
      ${current < questions.length-1 ? 'Nächste Frage →' : 'Ergebnis sehen 🏆'}
    </button>
  `;
}

function selectAnswer(idx) {
  if(answered) return;
  answered = true;

  const q = questions[current];
  const fb = document.getElementById('feedback');
  const nextBtn = document.getElementById('nextBtn');

  // Style all buttons
  q.opts.forEach((_,i) => {
    const btn = document.getElementById(`opt-${i}`);
    btn.disabled = true;
    if(i === q.correct) {
      btn.classList.add('correct');
    } else if(i === idx && idx !== q.correct) {
      btn.classList.add('wrong');
    } else if(i !== idx) {
      btn.style.opacity = '0.4';
    }
  });

  const dot = document.getElementById(`dot-${current}`);

  if(idx === q.correct) {
    score++;
    dot.classList.add('earned');
    dot.textContent = '⭐';
    fb.className = 'feedback correct-fb show';
    fb.innerHTML = `✅ ${q.fb}`;
  } else {
    dot.classList.add('wrong-dot');
    dot.textContent = '✗';
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = `❌ Nicht ganz! Die richtige Antwort war: <strong>${q.opts[q.correct]}</strong><br><br>${q.fb}`;
    missedQuestions.push({ q: q.q, correct: q.opts[q.correct] });
  }

  nextBtn.classList.add('show');
  document.getElementById('scoreText').textContent = `⭐ ${score} Punkte`;
}

function nextQuestion() {
  current++;
  if(current >= questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function getPraise(score, total) {
  const pct = score/total;
  if(pct === 1) return {
    emoji: '🏆',
    title: 'Weltmeister des Weltraums!',
    text: `Wow, ${score} von ${total} – das ist PERFEKT! Du weisst mehr über den Weltraum als viele Erwachsene! Du bist ein echter Weltraum-Forscher! 🚀🌟`
  };
  if(pct >= 0.83) return {
    emoji: '🌟',
    title: 'Weltraum-Superstar!',
    text: `${score} von ${total} – das ist fantastisch! Du hast mega viel aufgepasst und gelernt. Fast alles gewusst – du bist auf dem Weg zum echten Astronauten! 🚀`
  };
  if(pct >= 0.67) return {
    emoji: '🎉',
    title: 'Super gemacht!',
    text: `${score} von ${total} – das ist toll! Du weisst schon richtig viel über den Weltraum. Mit ein bisschen mehr Lesen wirst du bald alles wissen! 🌍`
  };
  if(pct >= 0.5) return {
    emoji: '😊',
    title: 'Gut gekämpft!',
    text: `${score} von ${total} – nicht schlecht! Du hast schon die Hälfte gewusst. Lies die Abenteuer nochmal und dann wirst du beim nächsten Mal viel besser! 💪`
  };
  return {
    emoji: '🌱',
    title: 'Du fängst gerade erst an!',
    text: `${score} von ${total} – das Wichtigste ist, dass du neugierig bist! Alle grossen Wissenschaftler haben mal bei null angefangen. Lies die Abenteuer nochmal – du schaffst das! 🚀`
  };
}

function getTips(score, total, missed) {
  const pct = score/total;
  const tips = [];

  if(pct < 1) {
    tips.push({ icon:'📖', text:'Lies die Abenteuer nochmal durch – beim zweiten Mal merkt man sich viel mehr!' });
  }
  if(missed.some(m => m.q.includes('Ameise') || m.q.includes('Naters') || m.q.includes('Proxima') || m.q.includes('Andromeda'))) {
    tips.push({ icon:'🐜', text:'Schau dir die Weltraum-Ameisen-Seite nochmal an – die Distanzvergleiche sind der kniffligste Teil!' });
  }
  if(missed.some(m => m.q.includes('Schwarzes') || m.q.includes('Spaghetti') || m.q.includes('Foto'))) {
    tips.push({ icon:'🕳️', text:'Die Schwarzen-Loch-Seite ist voll mit verrückten Fakten – lese sie nochmal und staune!' });
  }
  if(missed.some(m => m.q.includes('Erde') || m.q.includes('Meere') || m.q.includes('Feuerball'))) {
    tips.push({ icon:'🌍', text:'Schau nochmal wie die Erde entstanden ist – die Geschichte mit dem Feuerball ist besonders cool!' });
  }
  tips.push({ icon:'🔄', text:'Mache das Quiz nochmal – beim zweiten Versuch wirst du viel besser abschneiden!' });
  tips.push({ icon:'🗣️', text:'Erkläre jemandem anderem was du gelernt hast – wer erklärt, lernt doppelt so viel!' });

  return tips.slice(0, 4);
}

function showResult() {
  // Update progress to 100%
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = 'Quiz abgeschlossen! 🎉';
  document.getElementById('scoreText').textContent = `⭐ ${score} Punkte`;

  const praise = getPraise(score, questions.length);
  const tips = getTips(score, questions.length, missedQuestions);

  const missedHTML = missedQuestions.length > 0 ? `
    <div class="missed-box">
      <h3>📝 Diese Fragen nochmal anschauen:</h3>
      ${missedQuestions.map(m=>`
        <div class="missed-item">
          <div class="missed-q">${m.q}</div>
          <div class="missed-a">✅ ${m.correct}</div>
        </div>
      `).join('')}
    </div>
  ` : `
    <div class="missed-box" style="background:rgba(6,255,180,0.06);border-color:rgba(6,255,180,0.2)">
      <h3 style="color:#06FFB4">🏆 Keine Fehler – absolut perfekt!</h3>
      <div style="color:rgba(255,255,255,0.6);font-size:0.95rem">Du hast alle 12 Fragen richtig beantwortet. Das ist unglaublich!</div>
    </div>
  `;

  document.getElementById('questionArea').style.display = 'none';

  const result = document.getElementById('resultScreen');
  result.innerHTML = `
    <span class="result-emoji">${praise.emoji}</span>
    <div class="result-title">${praise.title}</div>
    <span class="result-score">${score} / ${questions.length}</span>

    <div class="praise-box">
      <h3>🎉 Dein Lob</h3>
      <p>${praise.text}</p>
    </div>

    ${missedHTML}

    <div class="tips-box">
      <h3>💡 So wirst du noch besser</h3>
      ${tips.map(t=>`
        <div class="tip-item">
          <span class="tip-icon">${t.icon}</span>
          <span class="tip-text">${t.text}</span>
        </div>
      `).join('')}
    </div>

    <button class="replay-btn" onclick="restartQuiz()">🔄 Nochmal spielen!</button>
    <a href="index.html" class="home-link">← Zurück zur Startseite</a>
  `;
  result.classList.add('show');

  // Confetti if good score
  if(score >= questions.length * 0.67) {
    launchConfetti();
  }
}

function launchConfetti() {
  const colors = ['#FFD166','#FF9A3C','#FF6B9D','#06FFB4','#06D6FF','#C77DFF','#ffffff'];
  for(let i=0;i<60;i++){
    const c=document.createElement('div');
    c.className='confetti-piece';
    c.style.cssText=`
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --cx:${Math.random()*100}vw;
      --cy:-20px;
      --csx:${(Math.random()-0.5)*200}px;
      --cr:${Math.random()*720-360}deg;
      --cd:${Math.random()*2+1}s;
      --cdelay:${Math.random()*1.5}s;
      border-radius:${Math.random()>0.5?'50%':'2px'};
    `;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 4000);
  }
}

function restartQuiz() {
  current = 0; score = 0; answered = false; missedQuestions = [];
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('questionArea').style.display = 'block';
  initStarDots();
  renderQuestion();
}

// START
initStarDots();
renderQuestion();
</script>
